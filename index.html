<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeltaMusic</title>
    
    <!-- PWA / iOS meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DeltaMusic">
    <meta name="theme-color" content="#0d0d12">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <h1>DeltaMusic</h1>
        </header>

        <!-- Main Content (List of songs) -->
        <main class="content-scroll">
            <div class="track-list" id="track-list">
                <!-- Tracks will be injected here -->
            </div>
        </main>

        <!-- Player Bar -->
        <div class="player-bar glass-panel" id="player-bar">
            <div class="player-info">
                <div class="track-artwork"></div>
                <div class="track-details">
                    <h3 id="current-title">Не воспроизводится</h3>
                    <p id="current-artist">...</p>
                </div>
            </div>
            <div class="player-controls">
                <button id="btn-prev" class="control-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="btn-play" class="control-btn play-btn">
                    <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" style="display:none;" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="btn-next" class="control-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
