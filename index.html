<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeltaMusic</title>

    <!-- PWA / iOS meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DeltaMusic">
    <meta name="theme-color" content="#0d0d12">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <h1 id="header-title">РњРѕСЏ РјСѓР·С‹РєР°</h1>
        </header>

        <!-- Main Content Area -->
        <main class="content-scroll">
            <!-- Home Tab (Saved Tracks) -->
            <div id="tab-home" class="tab-content active">
                <div class="empty-state" id="empty-state" style="display: none;">
                    РћС‚РєСЂРѕР№С‚Рµ РїРѕРёСЃРє, С‡С‚РѕР±С‹ РЅР°Р№С‚Рё Рё СЃРѕС…СЂР°РЅРёС‚СЊ РјСѓР·С‹РєСѓ.
                </div>
                <div class="track-list" id="saved-track-list">
                    <!-- Saved Tracks injected here -->
                </div>
            </div>

            <!-- Search Tab -->
            <div id="tab-search" class="tab-content" style="display: none;">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="РџРѕРёСЃРє С‚СЂРµРєРѕРІ, Р°СЂС‚РёСЃС‚РѕРІ..." autocomplete="off">
                    <button id="search-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                        </svg>
                    </button>
                </div>
                <div id="search-loading" style="display: none; text-align: center; margin-top: 20px;">
                    <div class="spinner"></div>
                </div>
                <div class="track-list" id="search-track-list">
                    <!-- Search Results injected here -->
                </div>
            </div>
        </main>

        <!-- Player Bar -->
        <div class="player-bar glass-panel" id="player-bar">
            <div class="player-loader" id="player-loader"></div>
            <div class="player-info" id="player-info-container">
                <div class="track-artwork" id="player-artwork"></div>
                <div class="track-details">
                    <h3 id="current-title">РќРµ РІРѕСЃРїСЂРѕРёР·РІРѕРґРёС‚СЃСЏ</h3>
                    <p id="current-artist">...</p>
                </div>
            </div>
            <div class="player-controls">
                <button id="btn-play" class="control-btn play-btn" disabled>
                    <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="icon-pause" style="display:none;" width="24" height="24" viewBox="0 0 24 24"
                        fill="currentColor">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass-panel">
            <button class="nav-item active" data-target="tab-home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                <span>РџР»РµРµСЂ</span>
            </button>
            <button class="nav-item" data-target="tab-search">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                </svg>
                <span>РџРѕРёСЃРє</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>

</html>
